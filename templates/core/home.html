{% extends 'base.html' %}

{% block title %}Strona główna{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="auth-card p-4">
        <h1 class="h3 mb-3">Witaj, {{ request.user.username }}</h1>
        <p class="mb-4">Jesteś zalogowany do aplikacji.</p>
        <a href="{% url 'logout' %}" class="btn btn-danger">Wyloguj się</a>
    </div>
</div>
{% endblock %}
